spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/cnpm8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

server.port=8084

file.upload-dir=uploads

server.base-url=${SERVER_URL:http://localhost:8084}


spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


jwt.secret=${JWT_SECRET:BlogSpaceSuperSecretKey2024ThisMustBeAtLeast256BitsLongForHS256Algorithm}


jwt.expiration-ms=604800000


logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.intern.cnpm8=DEBUG